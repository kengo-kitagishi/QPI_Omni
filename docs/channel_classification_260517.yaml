#                   (mixed = チャンネル内で細胞ごとに運命が異なる。詳細は notes に。)
#   phase2.outcome: revived | died_starvation | never_revived | mixed | n/a
#                   (mixed = チャンネル内の細胞によって運命が分かれる。詳細は notes に。)
#                   (n/a means cell already died in phase1)
#   phase*.notes:   free-text, can mention sub-phase (0.0055%, 0%, recovery)
